#popup{
height:58px;
width:155px;
background-color:#666666;	
border-radius:6px;
border:1px solid #4f4f4f;	
}

#popup_bar{
height:20px;
width:100%;
background-color:#E6E6E6;
border-radius:6px 6px 0 0;
text-align:center;
cursor:move;
}

.bodyy{
background-color: white;
width: 100%;
}

.svg-container{
stroke:black;
stroke-width:70;

#random {
border: 2px solid #AFAFAF;
box-shadow: 1px 1px 4px black;
border-radius: 15px;
width: 30px;
height: 30px;
bottom: 3px;
position:relative;
transform: translateY(-40%);
}

/* ========== style.css (colpick e estilos dos seletores) ========== */
body {
  background: #EEE;
  padding-top: 0px;
  text-align: center;
}

#controls {
  margin-left: 0px;
  vertical-align: 16px;
}

#controls div {
  margin: 0px 0px 17px 0px;
}

#controls span[data-type='color'] {
  display: inline-block;
  background-color: #F00;
  border: 2px solid #AFAFAF;
  box-shadow: 1px 1px 4px black;
  border-radius: 40px;
  padding: 0px;
  margin-top: -10px;
  width: 20px;
  height: 20px;
  margin-bottom:5px;
  cursor: pointer;
}

.colpick {
	position: absolute;
	width: 207px;
	height: 170px;
	overflow: hidden;
	display: none;
	font-family: Arial, Helvetica, sans-serif;
	background: #EBEBEB;
	border: 1px solid #BBB;
	border-radius: 5px;
	-webkit-user-select: none;
	-moz-user-select: none;
	-ms-user-select: none;
	-o-user-select: none;
	user-select: none;
	z-index: 1000;
}

.colpick_color {
  position: absolute;
  left: 7px;
  top: 7px;
  width: 156px;
  height: 156px;
  overflow: hidden;
  outline: 1px solid #AAA;
  cursor: crosshair;
}

.colpick_color_overlay1,
.colpick_color_overlay2 {
  position: absolute;
  left: 0;
  top: 0;
  width: 156px;
  height: 156px;
}

.colpick_color_overlay1 {
  background: linear-gradient(to right, white 0%, rgba(255, 255, 255, 0) 100%);
}

.colpick_color_overlay2 {
  background: linear-gradient(to bottom, rgba(0, 0, 0, 0) 0%, black 100%);
}

.colpick_selector_outer {
  background: none;
  position: absolute;
  width: 11px;
  height: 11px;
  margin: -6px 0 0 -6px;
  border: 1px solid #000;
  border-radius: 50%;
}

.colpick_selector_inner {
  position: absolute;
  width: 9px;
  height: 9px;
  border: 1px solid #FFF;
  border-radius: 50%;
}

.colpick_hue {
  position: absolute;
  top: 6px;
  left: 175px;
  width: 19px;
  height: 156px;
  border: 1px solid #AAA;
  cursor: n-resize;
}

.colpick_hue_arrs {
  position: absolute;
  left: -8px;
  width: 35px;
  height: 7px;
  margin: -7px 0 0 0;
}

.colpick_hue_larr,
.colpick_hue_rarr {
  position: absolute;
  width: 0;
  height: 0;
  border-top: 6px solid transparent;
  border-bottom: 6px solid transparent;
}

.colpick_hue_larr {
  border-left: 7px solid #858585;
}

.colpick_hue_rarr {
  right: 0;
  border-right: 7px solid #858585;
}

.colpick_new_color,
.colpick_current_color {
  position: absolute;
  top: 6px;
  width: 60px;
  height: 27px;
  background: #F00;
  border: 1px solid #8F8F8F;
}

.colpick_new_color {
  left: 207px;
}

.colpick_current_color {
  left: 277px;
}

.colpick_field,
.colpick_hex_field {
  position: absolute;
  height: 20px;
  width: 60px;
  overflow: hidden;
  background: #F3F3F3;
  color: #B8B8B8;
  font-size: 12px;
  border: 1px solid #BDBDBD;
  border-radius: 3px;
}

.colpick_rgb_r,
.colpick_rgb_g,
.colpick_rgb_b,
.colpick_hex_field {
  left: 207px;
}

.colpick_hsb_h,
.colpick_hsb_s,
.colpick_hsb_b {
  left: 277px;
}

.colpick_rgb_r,
.colpick_hsb_h {
  top: 40px;
}

.colpick_rgb_g,
.colpick_hsb_s {
  top: 67px;
}

.colpick_rgb_b,
.colpick_hsb_b {
  top: 94px;
}

.colpick_hex_field {
  width: 68px;
  top: 121px;
}

.colpick_focus {
  border-color: #999;
}

.colpick_field_letter {
  position: absolute;
  width: 12px;
  height: 20px;
  line-height: 20px;
  padding-left: 4px;
  background: #EFEFEF;
  border-right: 1px solid #BDBDBD;
  font-weight: bold;
  color: #777;
}

.colpick_field input,
.colpick_hex_field input {
  position: absolute;
  right: 11px;
  margin: 0;
  padding: 0;
  height: 20px;
  line-height: 20px;
  background: transparent;
  border: none;
  font-size: 12px;
  font-family: Arial, Helvetica, sans-serif;
  color: #555;
  text-align: right;
  outline: none;
}

.colpick_hex_field input {
  outline: none;
  right: 4px;
}

.colpick_field_arrs,
.colpick_field_uarr,
.colpick_field_darr {
  position: absolute;
}

.colpick_field_arrs {
  top: 0;
  right: 0;
  width: 9px;
  height: 21px;
  cursor: n-resize;
}

.colpick_field_uarr {
  top: 5px;
  width: 0;
  height: 0;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-bottom: 4px solid #959595;
}

.colpick_field_darr {
  bottom: 5px;
  width: 0;
  height: 0;
  border-left: 4px solid transparent;
  border-right: 4px solid transparent;
  border-top: 4px solid #959595;
}

.colpick_submit {
  position: absolute;
  left: 207px;
  top: 146px;
  width: 130px;
  height: 18px;
  line-height: 18px;
  background: #EFEFEF;
  text-align: center;
  color: #555;
  font-size: 12px;
  font-weight: bold;
  border: 1px solid #BDBDBD;
  border-radius: 3px;
  cursor: pointer;
}
.colpick_submit:hover {
  background: #F3F3F3;
  border-color: #999;
}

// Inicialização dos color pickers

	var current = {
        'picker': "#bgpicker",
        'color': "#ffffff",
        'graphic': "#bodyy"
    };

$("#bgpicker").colpick({color: "#ffffff",
onChange: function (hsb, hex, rgb, el, bySetColor) {

$("#bgpicker").css('background-color', newColor);},
onSubmit: function (hsb, hex, rgb, el) {
$(el).colpickHide();}}).css('background-color', "#ffffff");



$("#bgpicker1").colpick({color: "#2E0A0A",

$("#bgpicker1").css('background-color', newColor);},onSubmit: function (hsb, hex, rgb, el) {$(el).colpickHide();}}).css('background-color', "#2E0A0A");

$(".fil2").css("fill", newColor);
$("#bgpicker2").css('background-color', newColor);},onSubmit: function (hsb, hex, rgb, el) {$(el).colpickHide();}}).css('background-color', "#F8C578");


$("#bgpicker3").colpick({color: "#FF7CE5",

$(".fil0").css("fill", newColor);
$("#bgpicker3").css('background-color', newColor);},onSubmit: function (hsb, hex, rgb, el) {$(el).colpickHide();}}).css('background-color', "#FF7CE5");




function rgb2hex(rgb) {
    rgb = rgb.match(/^rgb\((\d+),\s*(\d+),\s*(\d+)\)$/);
    function hex(x) {
        return ("0" + parseInt(x).toString(16)).slice(-2);
    }
    var outputHex = "#" + hex(rgb[1]) + hex(rgb[2]) + hex(rgb[3]);
    return outputHex.toUpperCase();
}

}); //end document ready

// Função call1 - randomiza cores
function call1(){
	var safeColors = ['00', '33', '66', '99', 'cc', 'ff'];
	var rand = function() {
	  return Math.floor(Math.random() * 6);
	};
	var randomColor = function() {
	  var r = safeColors[rand()];
	  var g = safeColors[rand()];
	  var b = safeColors[rand()];
	  return "#" + r + g + b;
	};

var cor0 = randomColor()	
var cor1 = randomColor()	
var cor2 = randomColor()	
	
$('.fil0').css('fill', cor0);
$('.fil1').css('fill', cor1);
$('.fil2').css('fill', cor2);

$("#bgpicker1").css('background-color', cor1);
$("#bgpicker2").css('background-color', cor2);
$("#bgpicker3").css('background-color', cor0);
}
