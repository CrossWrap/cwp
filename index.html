<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de E-books - Ponto Cego</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .contact-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: white;
        }

        .contact-info a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }

        .contact-info a:hover {
            text-decoration: underline;
        }

        .tags-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .tag-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .tag-btn:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        .tag-btn.active {
            background: #ffd700;
            color: #333;
        }

        .books-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .book-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .book-card:hover {
            transform: translateY(-5px);
        }

        .book-image {
            width: 100%;
            height: 210;
            object-fit: cover;
            background: #f0f0f0;
        }

        .book-info {
            padding: 5px;
        }

        .book-title {
            font-size: 1.6rem;
            color: #333;
            margin-bottom: 2px;
            font-weight: 700;
        }

        .book-price {
            font-size: 1.2rem;
            color: #667eea;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .book-price.free {
            color: #27ae60;
        }

        .book-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-bottom: 15px;
        }

        .book-tag {
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        .book-link {
            display: block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s ease;
        }

        .book-link:hover {
            opacity: 0.9;
        }

        .stats-bar {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            color: white;
            text-align: center;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 50px;
        }

        .no-books {
            text-align: center;
            color: white;
            font-size: 1.2rem;
            padding: 50px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        footer {
            text-align: center;
            color: white;
            margin-top: 40px;
            padding: 20px;
            opacity: 0.8;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 2rem;
            }

            .books-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Cross Wrap Pattern</h1>         
            <p>Find digital patterns by category or title.</p>
        </header>

        <div class="contact-info">
            <p>📬 <strong>Pedidos especiais, outros formatos ou compra direta:</strong></p>
            <p>Send an email to <a href="mailto:ademir_romano@hotmail.com">ademir_romano@hotmail.com</a></p>
        </div>

        <div class="stats-bar" id="statsBar">
            Loading Patterns...
        </div>

        <div class="tags-filter" id="tagsFilter">
            <!-- Tags serão inseridas via JavaScript -->
        </div>

        <div class="books-grid" id="booksGrid">
            <div class="loading">Loading Patterns...</div>
        </div>

        <footer>
            <p>Catalog of Patterns | <span id="bookCount">0</span> patterns | Tag: <span id="currentTag">all</span></p>
        </footer>
    </div>

    <script>
        // URL do arquivo JSON (ajuste conforme necessário)
        const JSON_URL = 'patterns.json';

        let booksData = [];
        let activeTags = [];
        let currentTag = 'All';

        // Carregar dados do JSON
        async function loadBooks() {
            try {
                const response = await fetch(JSON_URL);
                const data = await response.json();
                
                booksData = data.patterns || [];
                activeTags = data.tags_ativas || [];
                
                renderTags();
                renderBooks();
                updateStats();
            } catch (error) {
                console.error('Erro ao carregar livros:', error);
                document.getElementById('booksGrid').innerHTML = 
                    '<div class="no-books">Erro ao carregar catálogo. Verifique o arquivo patterns.json</div>';
            }
        }

        // Renderizar botões de tag
        function renderTags() {
            const tagsContainer = document.getElementById('tagsFilter');
            tagsContainer.innerHTML = '';

            activeTags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = `tag-btn ${tag.trim() === currentTag.trim() ? 'active' : ''}`;
                btn.textContent = tag.trim();
                btn.onclick = () => filterByTag(tag.trim());
                tagsContainer.appendChild(btn);
            });
        }

        // Filtrar livros por tag
        function filterByTag(tag) {
            currentTag = tag;
            renderTags();
            renderBooks();
            updateStats();
        }

        // Renderizar livros
        function renderBooks() {
            const grid = document.getElementById('booksGrid');
            
            const filteredBooks = currentTag === 'All' 
                ? booksData 
                : booksData.filter(book => 
                    book.tags && book.tags.some(t => t.trim() === currentTag)
                );

            if (filteredBooks.length === 0) {
                grid.innerHTML = '<div class="no-books">No patterns found for this category</div>';
                return;
            }

            grid.innerHTML = filteredBooks.map(book => `
                <div class="book-card">
                    <img 
                        src="${book.imagem || 'imagens/placeholder.jpg'}" 
                        alt="${book.nome}" 
                        class="book-image"
                        onerror="this.src='https://via.placeholder.com/280x350?text=Sem+Imagem'"
                    >
                    <div class="book-info">
                        <h3 class="book-title">${book.nome}</h3>
                        <div class="book-price ${book.preco === 0 ? 'free' : ''}">
                            ${book.preco === 0 ? 'FREE' : `R$ ${book.preco.toFixed(2).replace('.', ',')}`}
                        </div>
                        <div class="book-tags">
                            ${book.tags ? book.tags.map(tag => 
                                `<span class="book-tag">${tag.trim()}</span>`
                            ).join('') : ''}
                        </div>
                        <a href="${book.link}" target="_blank" class="book-link">
                            🔗 LINK
                        </a>
                    </div>
                </div>
            `).join('');

            document.getElementById('bookCount').textContent = filteredBooks.length;
        }

        // Atualizar estatísticas
        function updateStats() {
            const statsBar = document.getElementById('statsBar');
            const totalBooks = booksData.length;
            const freeBooks = booksData.filter(b => b.preco === 0).length;
            
            statsBar.innerHTML = `
                <strong>Total:</strong> ${totalBooks} patterns | 
                <strong>Free:</strong> ${freeBooks} | 
                <strong>To Buy:</strong> ${totalBooks - freeBooks}
            `;
            
            document.getElementById('currentTag').textContent = currentTag.toLowerCase();
        }

        // Inicializar
        document.addEventListener('DOMContentLoaded', loadBooks);
    </script>
</body>
</html>
